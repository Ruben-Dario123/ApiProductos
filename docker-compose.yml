services:
  api:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/_build
      - /app/deps
    environment:
      - MIX_ENV=dev
    # ¡ESTA LÍNEA ES LA MAGIA QUE OBLIGA A DOCKER A ACTUALIZAR!
    command: sh -c "mix deps.get && mix phx.server"

  swagger:
    image: swaggerapi/swagger-ui
    ports:
      - "8080:8080"
    environment:
      SWAGGER_JSON: /mnt/openapi.yaml
    volumes:
      - ./openapi.yaml:/mnt/openapi.yaml